<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>FlashDrop Admin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f0f0f0;color:#fff;min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:20px}
.header{background:#0f0f0f;padding:20px;border-radius:12px;margin-bottom:20px;text-align:center}
.header h1{font-size:24px;margin-bottom:5px}
.header p{color:#999;font-size:14px}
.tabs{display:flex;gap:10px;margin-bottom:20px;background:#1a1a1a;padding:10px;border-radius:12px}
.tab-btn{flex:1;padding:12px;background:transparent;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;transition:all 0.3s}
.tab-btn.active{background:#0088cc;font-weight:600}
.tab-content{display:none}
.tab-content.active{display:block}
.card{background:#1a1a1a;border-radius:12px;padding:16px;margin-bottom:12px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-title{font-size:16px;font-weight:600}
.badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.badge.pending{background:#ffa500;color:#000}
.badge.progress{background:#0088cc}
.badge.delivered{background:#28a745}
.badge.cancelled{background:#dc3545}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #333;font-size:14px}
.info-row:last-child{border:none}
.info-label{color:#999}
.info-value{font-weight:500}
.btn{width:100%;padding:14px;background:#0088cc;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-top:10px}
.btn:active{opacity:0.8}
.btn-danger{background:#dc3545}
.btn-success{background:#28a745}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#1a1a1a;padding:16px;border-radius:12px;text-align:center}
.stat-value{font-size:28px;font-weight:700;color:#0088cc;margin-bottom:4px}
.stat-label{color:#999;font-size:12px}
.input{width:100%;padding:14px;background:#2a2a2a;border:1px solid #333;border-radius:10px;color:#fff;font-size:16px;margin-bottom:12px}
.input:focus{outline:none;border-color:#0088cc}
.select{width:100%;padding:14px;background:#2a2a2a;border:1px solid #333;border-radius:10px;color:#fff;font-size:16px;margin-bottom:12px}
.empty{text-align:center;padding:40px;color:#999}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 FlashDrop Admin</h1>
            <p id="user-info">Carregando...</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('pedidos')">Pedidos</button>
            <button class="tab-btn" onclick="showTab('lojas')">Lojas</button>
            <button class="tab-btn" onclick="showTab('motoboys')">Motoboys</button>
        </div>

        <div id="pedidos" class="tab-content active">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="total-pedidos">0</div>
                    <div class="stat-label">Total Pedidos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="pedidos-ativos">0</div>
                    <div class="stat-label">Ativos</div>
                </div>
            </div>
            <div id="pedidos-list"></div>
        </div>

        <div id="lojas" class="tab-content">
            <button class="btn" onclick="showNovaLoja()">+ Nova Loja</button>
            <div id="lojas-list"></div>
        </div>

        <div id="motoboys" class="tab-content">
            <button class="btn" onclick="showNovoMotoboy()">+ Novo Motoboy</button>
            <div id="motoboys-list"></div>
        </div>
    </div>

    <script>
const API='https://flashdrop-backend-production.up.railway.app';
let tg=window.Telegram.WebApp;
tg.expand();
tg.MainButton.hide();

let currentUser=null;

async function init(){
    try{
        const userId=tg.initDataUnsafe?.user?.id||'admin';
        const res=await fetch(`${API}/api/admin/login`,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({usuario:'admin',senha:'admin123'})
        });
        const data=await res.json();
        currentUser=data;
        document.getElementById('user-info').textContent=`👤 ${data.nome||'Admin'}`;
        loadPedidos();
    }catch(e){
        console.error(e);
        document.getElementById('user-info').textContent='❌ Erro ao carregar';
    }
}

async function loadPedidos(){
    try{
        const res=await fetch(`${API}/api/pedidos`);
        const pedidos=await res.json();
        
        document.getElementById('total-pedidos').textContent=pedidos.length;
        document.getElementById('pedidos-ativos').textContent=pedidos.filter(p=>p.status!=='entregue'&&p.status!=='cancelado').length;
        
        const list=document.getElementById('pedidos-list');
        if(pedidos.length===0){
            list.innerHTML='<div class="empty">Nenhum pedido encontrado</div>';
            return;
        }
        
        list.innerHTML=pedidos.map(p=>`
            <div class="card">
                <div class="card-header">
                    <div class="card-title">Pedido #${p.id}</div>
                    <span class="badge ${p.status}">${getStatusLabel(p.status)}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Loja:</span>
                    <span class="info-value">${p.loja_nome||'N/A'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Motoboy:</span>
                    <span class="info-value">${p.motoboy_nome||'Não atribuído'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Cliente:</span>
                    <span class="info-value">${p.cliente_nome}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Valor:</span>
                    <span class="info-value">R$ ${parseFloat(p.valor).toFixed(2)}</span>
                </div>
            </div>
        `).join('');
    }catch(e){
        console.error(e);
        document.getElementById('pedidos-list').innerHTML='<div class="empty">Erro ao carregar pedidos</div>';
    }
}

async function loadLojas(){
    try{
        const res=await fetch(`${API}/api/lojas`);
        const lojas=await res.json();
        
        const list=document.getElementById('lojas-list');
        if(lojas.length===0){
            list.innerHTML='<div class="empty">Nenhuma loja cadastrada</div>';
            return;
        }
        
        list.innerHTML=lojas.map(l=>`
            <div class="card">
                <div class="card-header">
                    <div class="card-title">${l.nome}</div>
                    <span class="badge ${l.ativo?'delivered':'cancelled'}">${l.ativo?'Ativa':'Inativa'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Endereço:</span>
                    <span class="info-value">${l.endereco}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Telefone:</span>
                    <span class="info-value">${l.telefone||'N/A'}</span>
                </div>
            </div>
        `).join('');
    }catch(e){
        console.error(e);
    }
}

async function loadMotoboys(){
    try{
        const res=await fetch(`${API}/api/motoboys`);
        const motoboys=await res.json();
        
        const list=document.getElementById('motoboys-list');
        if(motoboys.length===0){
            list.innerHTML='<div class="empty">Nenhum motoboy cadastrado</div>';
            return;
        }
        
        list.innerHTML=motoboys.map(m=>`
            <div class="card">
                <div class="card-header">
                    <div class="card-title">${m.nome}</div>
                    <span class="badge ${m.disponivel?'delivered':'cancelled'}">${m.disponivel?'Disponível':'Ocupado'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Telefone:</span>
                    <span class="info-value">${m.telefone||'N/A'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Veículo:</span>
                    <span class="info-value">${m.veiculo||'N/A'}</span>
                </div>
            </div>
        `).join('');
    }catch(e){
        console.error(e);
    }
}

function showTab(tab){
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    event.target.classList.add('active');
    
    if(tab==='pedidos')loadPedidos();
    if(tab==='lojas')loadLojas();
    if(tab==='motoboys')loadMotoboys();
}

function getStatusLabel(status){
    const labels={pendente:'Pendente',em_rota:'Em Rota',entregue:'Entregue',cancelado:'Cancelado'};
    return labels[status]||status;
}

function showNovaLoja(){
    tg.showAlert('Funcionalidade em desenvolvimento');
}

function showNovoMotoboy(){
    tg.showAlert('Funcionalidade em desenvolvimento');
}

init();
    </script>
</body>
</html>
