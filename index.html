<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FlashDrop</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#0f0f0f;color:#fff;min-height:100vh}
input,button{font-family:inherit}
.btn{width:100%;padding:16px;background:#a855f7;border:none;border-radius:10px;color:#fff;font-size:17px;cursor:pointer;font-weight:bold}
.btn:disabled{opacity:.6}
.inp{width:100%;padding:14px;background:#1a1a1a;border:1px solid #333;border-radius:10px;color:#fff;font-size:16px;display:block}
.card{background:#1a1a1a;border-radius:10px;padding:14px;margin-bottom:10px}
.tab-btn{padding:8px 16px;background:#222;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px}
.tab-btn.active{background:#a855f7;font-weight:bold}
.badge{padding:2px 8px;border-radius:20px;font-size:11px;color:#fff}
</style>
</head>
<body>
<div id="app"></div>
<script>
var API='https://flashdrop-backend-production.up.railway.app';
var tg=window.Telegram&&window.Telegram.WebApp;
if(tg){tg.expand();tg.ready();}
var state={user:null,tab:'pedidos',orders:[],users:[],settings:null,timer:null};

function el(tag,style,text){
  var e=document.createElement(tag);
  if(style)Object.keys(style).forEach(function(k){e.style[k]=style[k];});
  if(text!=null)e.textContent=text;
  return e;
}
function add(parent){for(var i=1;i<arguments.length;i++)if(arguments[i])parent.appendChild(arguments[i]);return parent;}

function statusBg(s){
  if(s==='pendente')return'#f59e0b';
  if(s==='aceito'||s==='na_loja'||s==='coletado')return'#3b82f6';
  if(s==='entregue')return'#22c55e';
  return'#ef4444';
}
function roleName(r){return r==='admin'?'Admin':r==='loja'?'Loja':'Motoboy';}
function roleColor(r){return r==='admin'?'#7c3aed':r==='loja'?'#f59e0b':'#22c55e';}

function badge(role){
  var b=el('span',{background:roleColor(role),padding:'2px 8px',borderRadius:'20px',fontSize:'11px',color:'#fff'},roleName(role));
  return b;
}

async function loadData(){
  try{
    var r1=await fetch(API+'/orders'),r2=await fetch(API+'/users'),r3=await fetch(API+'/settings');
    state.orders=await r1.json();
    state.users=await r2.json();
    state.settings=await r3.json();
    render();
  }catch(e){}
}

function renderLogin(){
  var wrap=el('div',{padding:'20px',maxWidth:'400px',margin:'60px auto'});
  var title=el('h1',{textAlign:'center',marginBottom:'8px',color:'#a855f7',fontSize:'32px',fontWeight:'bold'},'FlashDrop');
  var sub=el('p',{textAlign:'center',color:'#666',marginBottom:'30px',fontSize:'14px'},'Sistema de Entregas');
  var ui=el('input',{marginBottom:'12px'});ui.className='inp';ui.placeholder='Usuario';ui.type='text';
  var pi=el('input',{marginBottom:'16px'});pi.className='inp';pi.placeholder='Senha';pi.type='password';
  var err=el('p',{color:'#f87171',marginBottom:'12px',fontSize:'14px',display:'none'});
  var btn=el('button');btn.className='btn';btn.textContent='Entrar';
  btn.onclick=async function(){
    btn.disabled=true;btn.textContent='Entrando...';err.style.display='none';
    try{
      var r=await fetch(API+'/users/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:ui.value,password:pi.value})});
      var d=await r.json();
      if(r.ok){state.user=d;loadData();return;}
      err.textContent=d.error||'Credenciais invalidas';err.style.display='block';
    }catch(e){err.textContent='Erro ao conectar';err.style.display='block';}
    btn.disabled=false;btn.textContent='Entrar';
  };
  pi.onkeydown=function(e){if(e.key==='Enter')btn.click();};
  return add(wrap,title,sub,ui,pi,err,btn);
}

function renderHeader(){
  var div=el('div',{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 16px',background:'#1a1a1a',borderBottom:'1px solid #333'});
  var left=el('div');
  add(left,el('span',{color:'#a855f7',fontWeight:'bold',fontSize:'18px'},'FlashDrop'));
  var nameRow=el('div',{display:'flex',alignItems:'center',gap:'8px',marginTop:'4px'});
  add(nameRow,el('span',{fontSize:'13px',color:'#aaa'},state.user.name),badge(state.user.role));
  add(left,nameRow);
  var sair=el('button',{padding:'6px 12px',background:'#333',border:'none',borderRadius:'8px',color:'#fff',cursor:'pointer',fontSize:'12px'},'Sair');
  sair.onclick=function(){state.user=null;if(state.timer)clearInterval(state.timer);render();};
  return add(div,left,sair);
}

function renderTabBar(){
  if(state.user.role!=='admin')return null;
  var div=el('div',{display:'flex',gap:'4px',padding:'10px 16px',background:'#111',borderBottom:'1px solid #222'});
  [['pedidos','Pedidos'],['usuarios','Usuarios'],['config','Config']].forEach(function(pair){
    var b=el('button');b.className='tab-btn'+(state.tab===pair[0]?' active':'');b.textContent=pair[1];
    b.onclick=function(){state.tab=pair[0];render();};
    div.appendChild(b);
  });
  return div;
}

function renderPedidos(){
  var div=el('div',{padding:'16px'});
  add(div,el('h2',{marginBottom:'12px',fontSize:'16px',color:'#aaa'},'Pedidos ('+state.orders.length+')'));
  if(!state.orders.length){add(div,el('p',{color:'#555',textAlign:'center',padding:'40px'},'Nenhum pedido'));return div;}
  state.orders.forEach(function(o){
    var card=document.createElement('div');card.className='card';card.style.borderLeft='3px solid '+statusBg(o.status);
    var top=el('div',{display:'flex',justifyContent:'space-between',alignItems:'flex-start'});
    var info=el('div');
    add(info,el('p',{fontWeight:'bold',fontSize:'15px'},'#'+o.id+' - '+(o.loja_name||o.loja_user||'')));
    add(info,el('p',{color:'#aaa',fontSize:'13px',marginTop:'4px'},o.endereco_entrega||''));
    add(info,el('p',{color:'#aaa',fontSize:'13px'},(o.nome_cliente||'')+' | '+(o.telefone_cliente||'')));
    var st=el('span',{background:statusBg(o.status),padding:'3px 10px',borderRadius:'20px',fontSize:'12px',fontWeight:'bold',whiteSpace:'nowrap'},o.status);
    add(top,info,st);
    var bot=el('div',{display:'flex',gap:'8px',marginTop:'8px',flexWrap:'wrap'});
    add(bot,el('span',{fontSize:'12px',color:'#888'},'R$ '+Number(o.valor_motoboy||0).toFixed(2)+' motoboy'),el('span',{fontSize:'12px',color:'#888'},'R$ '+Number(o.valor_total||0).toFixed(2)+' total'));
    if(o.motoboy_name)add(bot,el('span',{fontSize:'12px',color:'#22c55e'},o.motoboy_name));
    add(card,top,bot);div.appendChild(card);
  });
  return div;
}

function renderUsuarios(){
  var div=el('div',{padding:'16px'});
  add(div,el('h2',{marginBottom:'12px',fontSize:'16px',color:'#aaa'},'Usuarios ('+state.users.length+')'));
  state.users.forEach(function(u){
    var card=document.createElement('div');card.className='card';card.style.display='flex';card.style.justifyContent='space-between';card.style.alignItems='center';
    var info=el('div');
    add(info,el('p',{fontWeight:'bold'},u.name),el('p',{color:'#888',fontSize:'13px',marginTop:'2px'},'@'+u.username+' | '+roleName(u.role)));
    if(u.role==='motoboy')add(info,el('p',{color:'#22c55e',fontSize:'13px',marginTop:'2px'},'Saldo: R$ '+Number(u.balance||0).toFixed(2)));
    var st=el('span',{padding:'4px 10px',background:u.blocked?'#ef4444':u.online?'#22c55e':'#555',borderRadius:'20px',fontSize:'12px'},u.blocked?'Bloqueado':u.online?'Online':'Offline');
    add(card,info,st);div.appendChild(card);
  });
  return div;
}

function renderConfig(){
  var div=el('div',{padding:'16px'});
  add(div,el('h2',{marginBottom:'12px',fontSize:'16px',color:'#aaa'},'Configuracoes'));
  if(!state.settings){add(div,el('p',{color:'#555'},'Carregando...'));return div;}
  var card=document.createElement('div');card.className='card';
  [['Taxa minima (R$)','min_fee'],['Preco/km (R$)','price_per_km'],['Arrancada (R$)','arrancada'],['Comissao (R$)','commission'],['Max pedidos/motoboy','max_per_motoboy']].forEach(function(pair){
    var wrap=el('div',{marginBottom:'14px'});
    add(wrap,el('p',{fontSize:'13px',color:'#888',marginBottom:'4px'},pair[0]));
    var inp=document.createElement('input');inp.className='inp';inp.type='number';inp.value=state.settings[pair[1]]||0;
    inp.onblur=async function(){
      var upd=Object.assign({},state.settings);upd[pair[1]]=parseFloat(inp.value);
      await fetch(API+'/settings',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(upd)});
      loadData();
    };
    add(wrap,inp);card.appendChild(wrap);
  });
  add(div,card);return div;
}

function render(){
  var app=document.getElementById('app');
  while(app.firstChild)app.removeChild(app.firstChild);
  if(!state.user){app.appendChild(renderLogin());return;}
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(loadData,10000);
  var wrap=el('div',{maxWidth:'600px',margin:'0 auto',paddingBottom:'80px'});
  wrap.appendChild(renderHeader());
  var tb=renderTabBar();
  if(tb)wrap.appendChild(tb);
  var tab=state.user.role==='admin'?state.tab:'pedidos';
  if(tab==='pedidos')wrap.appendChild(renderPedidos());
  else if(tab==='usuarios')wrap.appendChild(renderUsuarios());
  else if(tab==='config')wrap.appendChild(renderConfig());
  app.appendChild(wrap);
}

render();
</script>
</body>
</html>
