<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashDrop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }
    input, button, select, textarea { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const API = 'https://flashdrop-backend-production.up.railway.app';
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.expand(); tg.ready(); }

    function App() {
      const [user, setUser] = React.useState(null);
      const [username, setUsername] = React.useState('');
      const [password, setPassword] = React.useState('');
      const [error, setError] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const [tab, setTab] = React.useState('pedidos');
      const [users, setUsers] = React.useState([]);
      const [orders, setOrders] = React.useState([]);
      const [settings, setSettings] = React.useState(null);

      const login = async () => {
        setLoading(true); setError('');
        try {
          const res = await fetch(`${API}/users/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          const data = await res.json();
          if (res.ok) { setUser(data); loadData(data); }
          else setError(data.error || 'Credenciais invalidas');
        } catch(e) { setError('Erro ao conectar'); }
        setLoading(false);
      };

      const loadData = async (u) => {
        if (!u) return;
        try {
          const [ordRes, usrRes, setRes] = await Promise.all([
            fetch(`${API}/orders`),
            fetch(`${API}/users`),
            fetch(`${API}/settings`)
          ]);
          setOrders(await ordRes.json());
          setUsers(await usrRes.json());
          setSettings(await setRes.json());
        } catch(e) {}
      };

      React.useEffect(() => { if (user) { const t = setInterval(() => loadData(user), 10000); return () => clearInterval(t); } }, [user]);

      if (!user) return (
        <div style={{padding:20, maxWidth:400, margin:'60px auto'}}>
          <h1 style={{textAlign:'center', marginBottom:8, color:'#a855f7', fontSize:32, fontWeight:'bold'}}>FlashDrop</h1>
          <p style={{textAlign:'center', color:'#666', marginBottom:30, fontSize:14}}>Sistema de Entregas</p>
          <input value={username} onChange={e=>setUsername(e.target.value)} placeholder="Usuario" style={{width:'100%', padding:14, marginBottom:12, background:'#1a1a1a', border:'1px solid #333', borderRadius:10, color:'#fff', fontSize:16}} />
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()} placeholder="Senha" style={{width:'100%', padding:14, marginBottom:16, background:'#1a1a1a', border:'1px solid #333', borderRadius:10, color:'#fff', fontSize:16}} />
          {error && <p style={{color:'#f87171', marginBottom:12, fontSize:14}}>{error}</p>}
          <button onClick={login} disabled={loading} style={{width:'100%', padding:16, background:loading?'#7c3aed':'#a855f7', border:'none', borderRadius:10, color:'#fff', fontSize:17, cursor:'pointer', fontWeight:'bold', opacity:loading?0.7:1}}>
            {loading ? 'Entrando...' : 'Entrar'}
          </button>
        </div>
      );

      const badge = (role) => role==='admin'?'Admin':role==='loja'?'Loja':'Motoboy';
      const statusColor = (s) => s==='pendente'?'#f59e0b':s==='aceito'||s==='na_loja'||s==='coletado'?'#3b82f6':s==='entregue'?'#22c55e':'#ef4444';

      return (
        <div style={{maxWidth:600, margin:'0 auto', paddingBottom:80}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 16px', background:'#1a1a1a', borderBottom:'1px solid #333'}}>
            <span style={{color:'#a855f7', fontWeight:'bold', fontSize:18}}>FlashDrop</span>
            <div style={{display:'flex', alignItems:'center', gap:10}}>
              <span style={{fontSize:13, color:'#aaa'}}>{user.name} <span style={{background:'#7c3aed', padding:'2px 8px', borderRadius:20, fontSize:11}}>{badge(user.role)}</span></span>
              <button onClick={()=>setUser(null)} style={{padding:'6px 12px', background:'#333', border:'none', borderRadius:8, color:'#fff', cursor:'pointer', fontSize:12}}>Sair</button>
            </div>
          </div>

          {user.role==='admin' && (
            <div style={{display:'flex', gap:4, padding:'10px 16px', background:'#111', borderBottom:'1px solid #222'}}>
              {['pedidos','usuarios','config'].map(t=>(
                <button key={t} onClick={()=>setTab(t)} style={{padding:'8px 16px', background:tab===t?'#a855f7':'#222', border:'none', borderRadius:8, color:'#fff', cursor:'pointer', fontSize:13, fontWeight:tab===t?'bold':'normal'}}>
                  {t==='pedidos'?'Pedidos':t==='usuarios'?'Usuarios':'Config'}
                </button>
              ))}
            </div>
          )}

          <div style={{padding:16}}>
            {(tab==='pedidos' || user.role!=='admin') && (
              <div>
                <h2 style={{marginBottom:12, fontSize:16, color:'#aaa'}}>Pedidos ({orders.length})</h2>
                {orders.length===0 && <p style={{color:'#555', textAlign:'center', padding:40}}>Nenhum pedido</p>}
                {orders.map(o=>(
                  <div key={o.id} style={{background:'#1a1a1a', borderRadius:10, padding:14, marginBottom:10, borderLeft:`3px solid ${statusColor(o.status)}`}}>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
                      <div>
                        <p style={{fontWeight:'bold', fontSize:15}}>#{o.id} - {o.loja_name || o.loja_user}</p>
                        <p style={{color:'#aaa', fontSize:13, marginTop:4}}>{o.endereco_entrega}</p>
                        <p style={{color:'#aaa', fontSize:13}}>{o.nome_cliente} | {o.telefone_cliente}</p>
                      </div>
                      <span style={{background:statusColor(o.status), padding:'3px 10px', borderRadius:20, fontSize:12, fontWeight:'bold', whiteSpace:'nowrap'}}>{o.status}</span>
                    </div>
                    <div style={{display:'flex', gap:8, marginTop:8, flexWrap:'wrap'}}>
                      <span style={{fontSize:12, color:'#888'}}>R$ {Number(o.valor_motoboy||0).toFixed(2)} motoboy</span>
                      <span style={{fontSize:12, color:'#888'}}>R$ {Number(o.valor_total||0).toFixed(2)} total</span>
                      {o.motoboy_name && <span style={{fontSize:12, color:'#22c55e'}}>{o.motoboy_name}</span>}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {tab==='usuarios' && user.role==='admin' && (
              <div>
                <h2 style={{marginBottom:12, fontSize:16, color:'#aaa'}}>Usuarios ({users.length})</h2>
                {users.map(u=>(
                  <div key={u.id} style={{background:'#1a1a1a', borderRadius:10, padding:14, marginBottom:10, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                    <div>
                      <p style={{fontWeight:'bold'}}>{u.name}</p>
                      <p style={{color:'#888', fontSize:13}}>@{u.username} | {badge(u.role)}</p>
                      {u.role==='motoboy' && <p style={{color:'#22c55e', fontSize:13}}>Saldo: R$ {Number(u.balance||0).toFixed(2)}</p>}
                    </div>
                    <span style={{padding:'4px 10px', background:u.blocked?'#ef4444':u.online?'#22c55e':'#555', borderRadius:20, fontSize:12}}>
                      {u.blocked?'Bloqueado':u.online?'Online':'Offline'}
                    </span>
                  </div>
                ))}
              </div>
            )}

            {tab==='config' && user.role==='admin' && settings && (
              <div>
                <h2 style={{marginBottom:12, fontSize:16, color:'#aaa'}}>Configuracoes</h2>
                <div style={{background:'#1a1a1a', borderRadius:10, padding:16}}>
                  {[['Taxa minima (R$)','min_fee'],['Preco/km (R$)','price_per_km'],['Arrancada (R$)','arrancada'],['Comissao (R$)','commission'],['Max pedidos/motoboy','max_per_motoboy']].map(([label,key])=>(
                    <div key={key} style={{marginBottom:14}}>
                      <p style={{fontSize:13, color:'#888', marginBottom:4}}>{label}</p>
                      <input
                        type="number"
                        defaultValue={settings[key]}
                        onBlur={async(e)=>{
                          await fetch(`${API}/settings`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({...settings,[key]:e.target.value})});
                          loadData(user);
                        }}
                        style={{width:'100%', padding:10, background:'#111', border:'1px solid #333', borderRadius:8, color:'#fff', fontSize:15}}
                      />
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
