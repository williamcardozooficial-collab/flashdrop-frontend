<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cardapio</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0a;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh;padding-bottom:90px}.header{background:#1a1a2e;padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #2a2a4a;position:sticky;top:0;z-index:20}.back-btn{background:none;border:none;color:#bb86fc;font-size:22px;cursor:pointer}.header-info h2{font-size:17px;font-weight:700;color:#e0e0e0;margin:0}.header-info span{font-size:12px;color:#888}.banner{width:100%;height:150px;object-fit:cover;display:block}.loja-header{background:#1a1a2e;padding:14px 16px;border-bottom:1px solid #2a2a4a}.loja-nome{font-size:18px;font-weight:700;margin-bottom:4px}.loja-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:#888}.loja-tempo{color:#03dac6}.cats-scroll{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;background:#111;scrollbar-width:none;position:sticky;top:57px;z-index:10;border-bottom:1px solid #222}.cats-scroll::-webkit-scrollbar{display:none}.cat-pill{white-space:nowrap;padding:5px 14px;border-radius:20px;border:1px solid #333;background:transparent;color:#aaa;font-size:13px;cursor:pointer;transition:.2s}.cat-pill.active,.cat-pill:hover{background:#bb86fc;border-color:#bb86fc;color:#fff}.section-title{padding:14px 16px 6px;font-size:15px;font-weight:700;color:#bb86fc}.produtos-list{padding:0 16px;display:flex;flex-direction:column;gap:10px;margin-bottom:10px}.produto-card{background:#1a1a2e;border-radius:12px;display:flex;gap:12px;padding:12px;border:1px solid #2a2a4a}.produto-img{width:72px;height:72px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#2a2a4a}.produto-img-ph{width:72px;height:72px;border-radius:8px;background:#2a2a4a;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}.produto-info{flex:1;min-width:0}.produto-nome{font-size:14px;font-weight:600;margin-bottom:4px}.produto-desc{font-size:12px;color:#888;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.produto-preco{font-size:15px;font-weight:700;color:#03dac6}.produto-add{width:28px;height:28px;border-radius:50%;background:#bb86fc;border:none;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;align-self:flex-end}.carrinho-bar{position:fixed;bottom:0;left:0;right:0;background:#bb86fc;padding:14px 20px;display:none;align-items:center;justify-content:space-between;cursor:pointer;z-index:30}.carrinho-bar.show{display:flex}.cb-count{background:rgba(0,0,0,.25);border-radius:20px;padding:3px 10px;font-size:13px;font-weight:700;color:#fff}.cb-texto{font-size:15px;font-weight:700;color:#fff}.cb-total{font-size:15px;font-weight:700;color:#fff}.empty{text-align:center;padding:60px 20px;color:#555}.loading{text-align:center;padding:60px;color:#666}</style></head><body><div class="header"><button class="back-btn" onclick="history.back()">&#8592;</button><div class="header-info"><h2 id="hdr-nome">Carregando...</h2><span id="hdr-cat"></span></div></div><div id="loja-topo"></div><div class="cats-scroll" id="cats-bar" style="display:none"></div><div id="produtos-container"><div class="loading">Carregando...</div></div><div class="carrinho-bar" id="carrinho-bar" onclick="verCarrinho()"><span class="cb-count" id="cb-count">0</span><span class="cb-texto">Ver carrinho</span><span class="cb-total" id="cb-total">R$ 0,00</span></div><script>const API='https://flashdrop-backend-production.up.railway.app';const params=new URLSearchParams(location.search);const lojaId=params.get('loja');let _produtos=[],_carrinho=[];function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}function fmt(v){return 'R$ '+parseFloat(v||0).toFixed(2).replace('.',',');}async function init(){if(!lojaId){document.getElementById('produtos-container').innerHTML='<div class="empty">Loja nao especificada.</div>';return;}try{const[rL,rP]=await Promise.all([fetch(API+'/vitrine/lojas/'+lojaId).then(r=>r.json()),fetch(API+'/vitrine/lojas/'+lojaId+'/produtos').then(r=>r.json())]);_produtos=Array.isArray(rP)?rP:[];renderTopo(rL);renderProdutos(_produtos);}catch(e){document.getElementById('produtos-container').innerHTML='<div class="empty">Erro ao carregar.</div>';}}function renderTopo(l){document.getElementById('hdr-nome').textContent=l.name||'Loja';document.getElementById('hdr-cat').textContent=l.categoria_loja||'';document.title=(l.name||'Cardapio')+' - FlashDrop';const t=(l.tempo_entrega_min&&l.tempo_entrega_max)?'<span class="loja-tempo">&#9203; '+l.tempo_entrega_min+'-'+l.tempo_entrega_max+' min</span>':'';document.getElementById('loja-topo').innerHTML=(l.banner_url?'<img class="banner" src="'+esc(l.banner_url)+'" onerror="this.remove()">':'')+'<div class="loja-header"><div class="loja-nome">'+esc(l.name)+'</div><div class="loja-meta">'+(l.categoria_loja?'<span>&#128194; '+esc(l.categoria_loja)+'</span>':'')+(l.address?'<span>&#128205; '+esc(l.address)+'</span>':'')+t+'</div>'+(l.descricao_loja?'<div style="font-size:13px;color:#aaa;margin-top:8px">'+esc(l.descricao_loja)+'</div>':'')+'</div>';}function renderProdutos(lista){if(!lista.length){document.getElementById('produtos-container').innerHTML='<div class="empty">&#127869; Nenhum produto.</div>';return;}const cats=[...new Set(lista.map(p=>p.categoria||'Outros'))];const bar=document.getElementById('cats-bar');bar.style.display='flex';bar.innerHTML=cats.map((c,i)=>'<button class="cat-pill'+(i===0?' active':'')+'" onclick="scrollCat(''+c.replace(/'/g,"\'")+'\',this)">'+esc(c)+'</button>').join('');document.getElementById('produtos-container').innerHTML=cats.map(cat=>{const prods=lista.filter(p=>(p.categoria||'Outros')===cat);return'<div class="section-title" id="sc-'+esc(cat)+'">'+esc(cat)+'</div><div class="produtos-list">'+prods.map(p=>{const img=p.foto_url?'<img class="produto-img" src="'+esc(p.foto_url)+'" onerror="this.style.display='none'">':'<div class="produto-img-ph">&#127869;</div>';return'<div class="produto-card">'+img+'<div class="produto-info"><div class="produto-nome">'+esc(p.nome)+'</div>'+(p.descricao?'<div class="produto-desc">'+esc(p.descricao)+'</div>':'')+'<div class="produto-preco">'+fmt(p.preco)+'</div></div><button class="produto-add" onclick="add('+p.id+',event)">+</button></div>';}).join('')+'</div>';}).join('');}function scrollCat(cat,btn){document.querySelectorAll('.cat-pill').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const el=document.getElementById('sc-'+cat);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}function add(id,e){e.stopPropagation();const p=_produtos.find(x=>x.id===id);if(!p)return;const ex=_carrinho.find(c=>c.id===id);if(ex)ex.qty++;else _carrinho.push({...p,qty:1});atualizarCarrinho();}function atualizarCarrinho(){const total=_carrinho.reduce((s,c)=>s+parseFloat(c.preco||0)*c.qty,0);const qtd=_carrinho.reduce((s,c)=>s+c.qty,0);document.getElementById('cb-count').textContent=qtd;document.getElementById('cb-total').textContent=fmt(total);document.getElementById('carrinho-bar').classList.toggle('show',qtd>0);}function verCarrinho(){alert('Carrinho: '+_carrinho.map(c=>c.nome+' x'+c.qty).join(', ')+'\n\nEnvio de pedidos em breve!');}init();</script></body></html>
