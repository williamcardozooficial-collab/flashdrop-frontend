<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FlashDrop – Cadastro</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:500px;margin:0 auto}
.logo{text-align:center;margin-bottom:24px}
.logo h1{font-size:28px;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800}
.logo p{color:#999;font-size:13px;margin-top:4px}
.card{background:#1a1a2e;border-radius:16px;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.section-title{font-size:12px;font-weight:700;color:#667eea;text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px}
.input-group{margin-bottom:14px}
.input-group label{display:block;font-size:13px;color:#aaa;margin-bottom:6px;font-weight:500}
.input-group input,.input-group select{width:100%;background:#0f0f1a;border:1.5px solid #2a2a4a;border-radius:10px;padding:12px 14px;color:#e0e0e0;font-size:14px;outline:none;transition:border-color .2s}
.input-group input:focus,.input-group select:focus{border-color:#667eea}
.input-group select option{background:#1a1a2e}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:opacity .2s}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.error{background:#2d0a0a;border:1px solid #c0392b;border-radius:10px;padding:12px;color:#e74c3c;font-size:13px;margin-bottom:12px;display:none}
.success{background:#0a2d1a;border:1px solid #27ae60;border-radius:10px;padding:12px;color:#2ecc71;font-size:13px;margin-bottom:12px;display:none}
.login-link{text-align:center;margin-top:16px;font-size:13px;color:#999}
.login-link a{color:#667eea;font-weight:600;text-decoration:none}
.hint{font-size:11px;color:#666;margin-top:4px}
.required{color:#e74c3c}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>⚡ FlashDrop</h1>
    <p id="reg-title">Cadastro de Motoboy</p>
  </div>
  <div class="card">
    <div id="errorDiv" class="error"></div>
    <div id="successDiv" class="success"></div>


    <!-- SELEÇÃO DO TIPO DE CADASTRO -->
    <div class="section-title">Tipo de Cadastro</div>
    <div class="input-group" style="display:flex;gap:10px;margin-bottom:18px">
      <label style="flex:1;display:flex;align-items:center;gap:8px;background:#0f0f1a;border:2px solid #667eea;border-radius:10px;padding:12px;cursor:pointer" id="lbl-motoboy">
        <input type="radio" name="reg-tipo" id="tipo-motoboy" value="motoboy" checked onchange="onTipoChange()" style="width:auto;accent-color:#667eea">
        <span>🏍️ Motoboy</span>
      </label>
      <label style="flex:1;display:flex;align-items:center;gap:8px;background:#0f0f1a;border:2px solid #333;border-radius:10px;padding:12px;cursor:pointer" id="lbl-loja">
        <input type="radio" name="reg-tipo" id="tipo-loja" value="loja" onchange="onTipoChange()" style="width:auto;accent-color:#667eea">
        <span>🏪 Loja</span>
      </label>
    </div>
    <div class="section-title">📋 Dados de Acesso</div>
    <div class="input-group">
      <label>👤 Usuário <span class="required">*</span></label>
      <input type="text" id="username" placeholder="Nome de usuário (sem espaços)" required/>
    </div>
    <div class="input-group">
      <label>🔐 Senha <span class="required">*</span></label>
      <input type="password" id="password" placeholder="Crie uma senha" required/>
    </div>
    <div class="input-group">
      <label>🔐 Confirmar Senha <span class="required">*</span></label>
      <input type="password" id="password2" placeholder="Repita a senha" required/>
    </div>

    <div class="section-title">👤 Dados Pessoais</div>
    <div class="input-group">
      <label id="lbl-nome-campo">📛 Nome Completo <span class="required">*</span></label>
      <input type="text" id="name" placeholder="Seu nome completo" required/>
    </div>
<div id="div-motoboy-cpf" class="motoboy-only">
    <div class="input-group">
      <label>📄 CPF <span class="required">*</span></label>
      <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required/>
      <div class="hint">Formato: 000.000.000-00</div>
    </div>
</div><!-- /motoboy-cpf -->
    <div class="input-group">
      <label>📱 Telefone (WhatsApp) <span class="required">*</span></label>
      <input type="text" id="phone" placeholder="(00) 0 0000-0000" maxlength="16" required/>
      <div class="hint">Formato: (00) 0 0000-0000</div>
    </div>
    <div class="input-group">
      <label>📍 Endereço</label>
      <input type="text" id="address" placeholder="Rua, número, bairro, cidade"/>
    </div>

<div id="div-motoboy-extra" class="motoboy-only">
    <div class="section-title">🏍️ Dados da Moto</div>
    <div class="input-group">
      <label>🏍️ Veículo / Placa <span class="required">*</span></label>
      <input type="text" id="vehicle" placeholder="Ex: Honda CG 160 – ABC-1234" required/>
    </div>

    <div class="input-group">
      <label>🔗 Codigo de quem te indicou (opcional)</label>
      <input type="text" id="referral-code" placeholder="Ex: JOAO123" style="text-transform:uppercase"/>
      <div class="hint">Se um motoboy te indicou, coloque o codigo dele aqui</div>
    </div>
</div><!-- /motoboy-extra -->

    <!-- CAMPOS SOMENTE PARA LOJA -->
    <div id="div-loja-extra" class="loja-only" style="display:none">
      <div class="section-title">🏪 Dados da Loja</div>
      <div class="input-group">
        <label>📄 CNPJ (opcional)</label>
        <input type="text" id="cnpj" placeholder="00.000.000/0000-00"/>
      </div>
      <div class="input-group">
        <label>🏬 Razão Social / Nome da Loja</label>
        <input type="text" id="razao-social" placeholder="Ex: Restaurante do João LTDA"/>
      </div>
      <div class="input-group">
        <label>🔗 Código de quem te indicou (opcional)</label>
        <input type="text" id="referral-loja" placeholder="Código do motoboy indicador">
      </div>
    </div><!-- /loja-extra -->

    <button class="btn btn-primary" id="registerBtn" onclick="doRegister()">📝 Solicitar Cadastro</button>
    <p class="login-link">Já tem conta? <a href="login.html">Entrar</a></p>
  </div>
</div>
<script>

  // ── LÓGICA DE TIPO DE CADASTRO ─────────────────────────────────────
  function onTipoChange() {
    var tipo = document.querySelector('input[name="reg-tipo"]:checked').value;
    var isMotoboy = (tipo === 'motoboy');
    // Mostrar/ocultar campos
    document.querySelectorAll('.motoboy-only').forEach(function(el) {
      el.style.display = isMotoboy ? '' : 'none';
    });
    document.querySelectorAll('.loja-only').forEach(function(el) {
      el.style.display = isMotoboy ? 'none' : '';
    });
    // Atualizar título e required
    document.getElementById('reg-title').textContent = isMotoboy ? 'Cadastro de Motoboy' : 'Cadastro de Loja';
    document.querySelector('title').textContent = isMotoboy ? 'FlashDrop – Cadastro Motoboy' : 'FlashDrop – Cadastro Loja';
    document.getElementById('lbl-nome-campo').innerHTML = isMotoboy ? '📛 Nome Completo <span class="required">*</span>' : '🏪 Razão Social / Nome da Loja <span class="required">*</span>';
    document.getElementById('name').placeholder = isMotoboy ? 'Seu nome completo' : 'Nome da loja ou razão social';
    // Destacar o radio selecionado
    document.getElementById('lbl-motoboy').style.borderColor = isMotoboy ? '#667eea' : '#333';
    document.getElementById('lbl-loja').style.borderColor = isMotoboy ? '#333' : '#667eea';
  }
const API='https://flashdrop-backend-production.up.railway.app';
let tg=window.Telegram?.WebApp;
if(tg) tg.expand();

/* Máscara CPF */
document.getElementById('cpf').addEventListener('input',function(){
  let v=this.value.replace(/\D/g,'');
  if(v.length>11)v=v.slice(0,11);
  v=v.replace(/(\d{3})(\d)/,'$1.$2');
  v=v.replace(/(\d{3})(\d)/,'$1.$2');
  v=v.replace(/(\d{3})(\d{1,2})$/,'$1-$2');
  this.value=v;
});

/* Máscara telefone */
document.getElementById('phone').addEventListener('input',function(){
  let v=this.value.replace(/\D/g,'');
  if(v.length>11)v=v.slice(0,11);
  if(v.length<=10){
    v=v.replace(/(\d{2})(\d)/,'($1) $2');
    v=v.replace(/(\d{4})(\d)/,'$1-$2');
  } else {
    v=v.replace(/(\d{2})(\d)/,'($1) $2');
    v=v.replace(/(\d{1})(\d{4})(\d)/,'$1 $2-$3');
  }
  this.value=v;
});

function showError(msg){
  const d=document.getElementById('errorDiv');
  d.textContent=msg; d.style.display='block';
  document.getElementById('successDiv').style.display='none';
}
function showSuccess(msg){
  const d=document.getElementById('successDiv');
  d.textContent=msg; d.style.display='block';
  document.getElementById('errorDiv').style.display='none';
}

  async function doRegister(){
    var tipo = document.querySelector('input[name="reg-tipo"]:checked').value;
    var isMotoboy = (tipo === 'motoboy');
    var username=document.getElementById('username').value.trim();
    var password=document.getElementById('password').value;
    var password2=document.getElementById('password2').value;
    var name=document.getElementById('name').value.trim();
    var phone=document.getElementById('phone').value.trim();
    var address=document.getElementById('address').value.trim();
    var cpf='', vehicle='', referralCode='';
    if (isMotoboy) {
      cpf=document.getElementById('cpf').value.trim();
      vehicle=document.getElementById('vehicle').value.trim();
      referralCode=document.getElementById('referral-code').value.trim().toUpperCase()||null;
    }
    var cnpj='', razaoSocial='', referralLoja='';
    if (!isMotoboy) {
      cnpj=document.getElementById('cnpj').value.trim();
      razaoSocial=document.getElementById('razao-social').value.trim();
      referralLoja=document.getElementById('referral-loja').value.trim().toUpperCase();
    }
    if(!username||!password||!name||!phone){
      showError('❌ Preencha todos os campos obrigatórios.'); return;
    }
    if(!/^\S+$/.test(username)){
      showError('❌ Usuário não pode ter espaços.'); return;
    }
    if(password!==password2){
      showError('❌ As senhas não coincidem.'); return;
    }
    if(password.length<6){
      showError('❌ A senha deve ter pelo menos 6 caracteres.'); return;
    }
    if(!/^\(\d{2}\) \d \d{4}-\d{4}$/.test(phone)){
      showError('❌ Telefone inválido. Use o formato (00) 0 0000-0000'); return;
    }
    if (isMotoboy) {
      if(!cpf||!vehicle){
        showError('❌ Preencha CPF e Veículo/Placa.'); return;
      }
      if(!/^\d{3}\.\d{3}\.\d{3}-\d{2}$/.test(cpf)){
        showError('❌ CPF inválido. Use o formato 000.000.000-00'); return;
      }
    }
    if (!isMotoboy && !razaoSocial) {
      showError('❌ Informe o Nome/Razão Social da loja.'); return;
    }
    var body = {username: username, password: password, role: tipo, name: name, phone: phone, address: address};
    if (isMotoboy) {
      body.cpf = cpf; body.vehicle = vehicle; body.referral_code = referralCode || null; body.cnpj = cnpj || null; body.razao_social = razaoSocial || null;
    } else {
      body.referral_code = referralLoja || null; body.cnpj = cnpj || null; body.razao_social = razaoSocial || null;
    }
    document.getElementById('registerBtn').disabled=true;
    try {
      var resp=await fetch(API+'/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      var d=await resp.json();
      if(!resp.ok){ showError('❌ '+(d.error||'Erro ao cadastrar.')); }
      else { showSuccess('✅ Cadastro enviado! Aguarde a aprovação do administrador.'); }
    } catch(e){ showError('❌ Erro de conexão: '+e.message); }
    document.getElementById('registerBtn').disabled=false;
  }
</script>
</body>
</html>
