<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>FlashDrop - Lojas</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0a;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh}.header{background:#1a1a2e;padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2a2a4a;position:sticky;top:0;z-index:10}.header h1{font-size:20px;font-weight:700;color:#bb86fc}.header span{font-size:13px;color:#888}.search-wrap{padding:16px 16px 8px}.search-wrap input{width:100%;background:#1e1e2e;border:1px solid #333;border-radius:10px;padding:10px 14px;color:#e0e0e0;font-size:14px;outline:none}.search-wrap input:focus{border-color:#bb86fc}.cats{display:flex;gap:8px;overflow-x:auto;padding:8px 16px 12px;scrollbar-width:none}.cats::-webkit-scrollbar{display:none}.cat-btn{white-space:nowrap;padding:6px 14px;border-radius:20px;border:1px solid #333;background:transparent;color:#aaa;font-size:13px;cursor:pointer;transition:.2s}.cat-btn.active,.cat-btn:hover{background:#bb86fc;border-color:#bb86fc;color:#fff}.lojas{padding:0 16px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}.loja-card{background:#1a1a2e;border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s;border:1px solid #2a2a4a}.loja-card:hover{border-color:#bb86fc;transform:translateY(-2px)}.loja-banner{width:100%;height:120px;object-fit:cover;background:#2a2a4a}.loja-banner-placeholder{width:100%;height:120px;background:linear-gradient(135deg,#1a1a3e,#2a1a5e);display:flex;align-items:center;justify-content:center;font-size:36px}.loja-info{padding:12px 14px}.loja-nome{font-size:16px;font-weight:700;color:#e0e0e0;margin-bottom:4px}.loja-cat{font-size:12px;color:#bb86fc;margin-bottom:6px}.loja-desc{font-size:13px;color:#888;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.loja-footer{display:flex;align-items:center;gap:12px;font-size:12px;color:#666}.loja-tempo{color:#03dac6}.empty{text-align:center;padding:60px 20px;color:#555}.empty span{font-size:48px;display:block;margin-bottom:12px}.loading{text-align:center;padding:60px;color:#666}</style></head><body><div class="header"><div><h1>FlashDrop</h1><span>Lojas</span></div></div><div class="search-wrap"><input id="busca" placeholder="Buscar loja..." oninput="filtrar()"></div><div class="cats" id="cats-bar"><button class="cat-btn active" onclick="filtrarCat('',this)">Todas</button></div><div class="lojas" id="lojas-grid"><div class="loading">Carregando...</div></div><script>const API='https://flashdrop-backend-production.up.railway.app';let _lojas=[],_catAtiva='';function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}async function init(){try{const r=await fetch(API+'/vitrine/lojas');_lojas=await r.json();if(!Array.isArray(_lojas))_lojas=[];const cats=[...new Set(_lojas.map(l=>l.categoria_loja).filter(Boolean))].sort();const bar=document.getElementById('cats-bar');cats.forEach(c=>{const btn=document.createElement('button');btn.className='cat-btn';btn.textContent=c;btn.onclick=function(){filtrarCat(c,this);};bar.appendChild(btn);});renderLojas(_lojas);}catch(e){document.getElementById('lojas-grid').innerHTML='<div class="empty"><span>&#128565;</span>Erro ao carregar.</div>';}}function filtrarCat(cat,btn){_catAtiva=cat;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');filtrar();}function filtrar(){const q=document.getElementById('busca').value.toLowerCase();const lista=_lojas.filter(l=>{const mc=!_catAtiva||l.categoria_loja===_catAtiva;const mq=!q||l.name.toLowerCase().includes(q)||(l.categoria_loja||'').toLowerCase().includes(q)||(l.descricao_loja||'').toLowerCase().includes(q);return mc&&mq;});renderLojas(lista);}function renderLojas(lista){const grid=document.getElementById('lojas-grid');if(!lista.length){grid.innerHTML='<div class="empty"><span>&#127978;</span>Nenhuma loja.</div>';return;}grid.innerHTML=lista.map(l=>{const b=l.banner_url?'<img class="loja-banner" src="'+esc(l.banner_url)+'" onerror="this.style.display='none'">':'<div class="loja-banner-placeholder">&#127978;</div>';const t=(l.tempo_entrega_min&&l.tempo_entrega_max)?'<span class="loja-tempo">&#9203; '+l.tempo_entrega_min+'-'+l.tempo_entrega_max+' min</span>':'';return '<div class="loja-card" onclick="ir('+l.id+')">'+b+'<div class="loja-info"><div class="loja-nome">'+esc(l.name)+'</div>'+(l.categoria_loja?'<div class="loja-cat">'+esc(l.categoria_loja)+'</div>':'')+(l.descricao_loja?'<div class="loja-desc">'+esc(l.descricao_loja)+'</div>':'')+'<div class="loja-footer">'+t+'</div></div></div>';}).join('');}function ir(id){window.location.href='cardapio.html?loja='+id;}init();</script></body></html>
